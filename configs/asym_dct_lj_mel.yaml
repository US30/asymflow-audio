name: asym_dct_lj_mel
loss: asym_fm
projector: dct2d
mel_bins: 80
time_frames: 8
rank_freq: 4
rank_time: 4            # rank=16/640, elbow from variance analysis

data:
  root: data/LJSpeech-1.1
  domain: lj_mel
  sample_rate: 16000
  length: 16000
  stats_path: data/ljspeech_mel_stats.pt
  mel_bins: 80
  time_frames: 8

model:
  patch_size: 640
  dim: 384
  depth: 12
  heads: 6
  mlp_ratio: 4

train:
  steps: 200000
  batch_size: 128
  grad_accum: 1
  lr: 1e-4
  warmup_steps: 4000
  bf16: true
  ema_decay: 0.9999
  log_every: 200
  save_every: 20000
  sample_every: 10000
  num_samples: 16
  seed: 42

sample:
  steps: 50
  sigma_min: 1e-3
