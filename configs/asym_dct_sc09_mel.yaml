name: asym_dct_sc09_mel
loss: asym_fm
projector: dct2d
mel_bins: 80
time_frames: 8
rank_freq: 4            # keep top-4 DCT freq components (out of 80)
rank_time: 4            # keep top-4 DCT time components (out of 8)
                        # total rank = 16 out of 640

data:
  root: data/sc09
  domain: sc09_mel
  sample_rate: 16000
  length: 7680
  stats_path: data/sc09_mel_stats.pt
  mel_bins: 80
  time_frames: 8

model:
  patch_size: 640
  dim: 384
  depth: 12
  heads: 6
  mlp_ratio: 4

train:
  steps: 100000
  batch_size: 128
  grad_accum: 1
  lr: 1e-4
  warmup_steps: 2000
  bf16: true
  ema_decay: 0.9999
  log_every: 100
  save_every: 10000
  sample_every: 5000
  num_samples: 16
  seed: 42

sample:
  steps: 50
  sigma_min: 1e-3
